<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ESP32 Sensor Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #07090d;
    --bg-2: #0d1117;
    --panel: #131922;
    --panel-2: #1a212c;
    --panel-3: #232b38;
    --border: #232b38;
    --border-2: #2a3340;
    --text: #e6edf3;
    --text-dim: #b8c1cc;
    --muted: #7a8694;
    --subtle: #5a6371;
    --accent: #4ea8ff;
    --accent-glow: rgba(78, 168, 255, 0.15);
    --good: #4ade80;
    --good-bg: rgba(74, 222, 128, 0.12);
    --warn: #fbbf24;
    --warn-bg: rgba(251, 191, 36, 0.12);
    --bad: #f87171;
    --bad-bg: rgba(248, 113, 113, 0.12);
    --critical: #ef4444;
    --critical-bg: rgba(239, 68, 68, 0.15);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(ellipse at top left, rgba(78, 168, 255, 0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(167, 139, 250, 0.06), transparent 50%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    -webkit-font-smoothing: antialiased;
  }

  /* ========== HEADER ========== */
  header {
    padding: 20px 32px;
    background: rgba(13, 17, 23, 0.7);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, #4ea8ff, #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(78, 168, 255, 0.3);
  }

  .brand-text h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .brand-text p {
    margin: 0;
    font-size: 12px;
    color: var(--muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .connection-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--good-bg);
    border: 1px solid rgba(74, 222, 128, 0.3);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    color: var(--good);
  }

  .connection-pill.stale {
    background: var(--bad-bg);
    border-color: rgba(248, 113, 113, 0.3);
    color: var(--bad);
  }

  .pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 0 0 currentColor;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
    70% { box-shadow: 0 0 0 8px transparent; opacity: 0.7; }
    100% { box-shadow: 0 0 0 0 transparent; opacity: 1; }
  }

  .last-update {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border-2);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  button:hover {
    background: var(--panel-3);
    border-color: var(--subtle);
  }

  button:active { transform: translateY(1px); }

  button.active {
    background: linear-gradient(135deg, #4ea8ff, #6c8fff);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* ========== MAIN LAYOUT ========== */
  main {
    padding: 28px 32px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  /* ========== METRIC CARDS ========== */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .card {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px 12px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: var(--border-2);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--card-color, var(--accent));
    opacity: 0.7;
  }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .card-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .card-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--card-icon-bg, rgba(78, 168, 255, 0.12));
    color: var(--card-color, var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-icon svg { width: 16px; height: 16px; }

  .status-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--good-bg);
    color: var(--good);
    border: 1px solid currentColor;
    border-color: transparent;
  }

  .status-badge.warn { background: var(--warn-bg); color: var(--warn); }
  .status-badge.bad  { background: var(--bad-bg);  color: var(--bad); }
  .status-badge.crit { background: var(--critical-bg); color: var(--critical); }

  .card-value {
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 8px;
  }

  .card-value .number {
    font-size: 32px;
    letter-spacing: -0.02em;
  }

  .card-value .unit {
    font-size: 14px;
    color: var(--muted);
    font-weight: 500;
    margin-left: 2px;
  }

  .card-trend {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    margin-left: 4px;
  }

  .card-trend.up   { color: var(--good); }
  .card-trend.down { color: var(--bad); }
  .card-trend.flat { color: var(--muted); }

  .card-trend svg { width: 10px; height: 10px; }

  .card-status-text {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    height: 14px;
  }

  .sparkline {
    height: 36px;
    margin: 0 -20px -12px -20px;
    padding: 0 0 0 0;
  }

  .sparkline svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ========== CHART PANEL ========== */
  .chart-section {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .chart-title {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
  }

  .chart-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chart-controls button { padding: 6px 12px; font-size: 12px; }

  .chart-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }

  .chart-stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .chart-stat .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 600;
  }

  .chart-stat .stat-value {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }

  .chart-wrap {
    position: relative;
    height: 360px;
  }

  /* ========== INFO BAR ========== */
  .info-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
  }

  .info-tile {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .info-tile .info-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(78, 168, 255, 0.1);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .info-tile .info-icon svg { width: 16px; height: 16px; }

  .info-tile-body { display: flex; flex-direction: column; gap: 2px; }

  .info-tile-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
  }

  .info-tile-value {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  /* ========== ERROR ========== */
  .error {
    background: var(--bad-bg);
    border: 1px solid rgba(248, 113, 113, 0.3);
    color: var(--bad);
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 16px;
    display: none;
    font-size: 13px;
  }
  .error.visible { display: block; }

  /* ========== LOADING ========== */
  .skeleton {
    background: linear-gradient(90deg, var(--panel-2) 0%, var(--panel-3) 50%, var(--panel-2) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    color: transparent;
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  footer {
    text-align: center;
    color: var(--subtle);
    font-size: 11px;
    padding: 24px 16px 8px;
  }

  /* Responsive */
  @media (max-width: 640px) {
    header { padding: 16px 18px; }
    main { padding: 20px 16px 40px; }
    .card-value .number { font-size: 26px; }
  }
</style>
</head>
<body>

<header>

// Sensor configuration: thresholds for status badges + colors

let chart;
let activeSensor = 'temp';
let sessionStart = Date.now();
let lastFetchOk = false;

function fmtTime(iso) {
  const d = new Date(iso);
  const p = (n) => String(n).padStart(2, '0');
  return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

function fmtAgo(iso) {
  const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (sec < 60) return `${sec}s ago`;
  if (sec < 3600) return `${Math.floor(sec / 60)}m ago`;
  return `${Math.floor(sec / 3600)}h ago`;
}

function fmtUptime(ms) {
  const sec = Math.floor(ms / 1000);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function makeSparkline(values, color) {
  if (!values || values.length < 2) {
    return '<svg viewBox="0 0 200 36" preserveAspectRatio="none"></svg>';
  }
  const valid = values.filter((v) => v != null && !isNaN(v));
  if (valid.length < 2) return '<svg viewBox="0 0 200 36"></svg>';
  const min = Math.min(...valid);
  const max = Math.max(...valid);
  const range = (max - min) || 1;
  const w = 200, h = 36;
  const step = w / (values.length - 1);
  const pad = 3;
  const usableH = h - pad * 2;
  const points = values.map((v, i) => {
    const x = i * step;
    const y = (v == null) ? h / 2 : (h - pad) - ((v - min) / range) * usableH;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const linePoints = points.join(' ');
  const areaPoints = `${points[0].split(',')[0]},${h} ${linePoints} ${points[points.length - 1].split(',')[0]},${h}`;
  return `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="g-${Math.random().toString(36).slice(2, 8)}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polyline points="${areaPoints}" fill="${color}" fill-opacity="0.12" stroke="none"/>
      <polyline points="${linePoints}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
}

function trendArrow(curr, prev) {
  if (curr == null || prev == null) {
    return { dir: 'flat', delta: '—', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>' };
  }
  const d = curr - prev;
  const abs = Math.abs(d);
  if (abs < 0.01) {
    return { dir: 'flat', delta: '0', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>' };
  }
  if (d > 0) {
    return { dir: 'up', delta: `+${abs.toFixed(abs < 10 ? 1 : 0)}`,
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"/></svg>' };
  }
  return { dir: 'down', delta: `-${abs.toFixed(abs < 10 ? 1 : 0)}`,
    svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' };
}

async function fetchRows() {
  const url = `${SUPABASE_URL}?select=*&order=created_at.desc&limit=${ROW_LIMIT}`;
  const res = await fetch(url, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
    },
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
  return res.json();
}

function renderCards(rowsDesc) {
  const latest = rowsDesc[0];
  const prev = rowsDesc[1];
  const container = document.getElementById('cards');
  container.innerHTML = SENSORS.map((s) => {
    const v = latest?.[s.key];
    const pv = prev?.[s.key];
    const display = (v == null) ? '—' : Number(v).toFixed(s.decimals);
    const status = s.statusFn(v);
    const trend = trendArrow(v, pv);

    // Build series oldest -> newest for sparkline
    const series = [...rowsDesc].reverse().map((r) => r[s.key]);
    const spark = makeSparkline(series, s.color);

    return `
      <div class="card" style="--card-color: ${s.color}; --card-icon-bg: ${s.iconBg};">
        <div class="card-head">
          <div class="card-label">
            <span class="card-icon">${ICONS[s.key]}</span>
            ${s.label}
          </div>
          <span class="status-badge ${status.tier}">${status.text}</span>
        </div>
        <div class="card-value">
          <span class="number">${display}</span>
          <span class="unit">${s.unit}</span>
          <span class="card-trend ${trend.dir}">${trend.svg}${trend.delta}</span>
        </div>
        <div class="card-status-text">vs previous reading</div>
        <div class="sparkline">${spark}</div>
      </div>`;
  }).join('');
}

function renderChartControls() {
  const wrap = document.getElementById('chartControls');
  wrap.innerHTML = SENSORS.map((s) => `
    <button data-key="${s.key}" class="${s.key === activeSensor ? 'active' : ''}">
      ${s.label}
    </button>`).join('');
  wrap.querySelectorAll('button').forEach((btn) => {
    btn.addEventListener('click', () => {
      activeSensor = btn.dataset.key;
      wrap.querySelectorAll('button').forEach((b) =>
        b.classList.toggle('active', b.dataset.key === activeSensor)
      );
      const s = SENSORS.find((x) => x.key === activeSensor);
      document.getElementById('chartTitle').textContent = s.label;
      updateChart(window._lastRows || []);
    });
  });
}

function renderChartStats(values, sensor) {
  const valid = values.filter((v) => v != null && !isNaN(v));
  const stats = document.getElementById('chartStats');
  if (valid.length === 0) {
    stats.innerHTML = '';
    return;
  }
  const min = Math.min(...valid);
  const max = Math.max(...valid);
  const avg = valid.reduce((a, b) => a + b, 0) / valid.length;
  const curr = valid[valid.length - 1];
  const fmt = (v) => Number(v).toFixed(sensor.decimals);
  stats.innerHTML = `
    <div class="chart-stat"><span class="stat-label">Current</span>
      <span class="stat-value" style="color: ${sensor.color}">${fmt(curr)} <span style="font-size: 11px; color: var(--muted)">${sensor.unit}</span></span>
    </div>
    <div class="chart-stat"><span class="stat-label">Minimum</span>
      <span class="stat-value">${fmt(min)}</span>
    </div>
    <div class="chart-stat"><span class="stat-label">Maximum</span>
      <span class="stat-value">${fmt(max)}</span>
    </div>
    <div class="chart-stat"><span class="stat-label">Average</span>
      <span class="stat-value">${fmt(avg)}</span>
    </div>
    <div class="chart-stat"><span class="stat-label">Samples</span>
      <span class="stat-value">${valid.length}</span>
    </div>`;
}

function updateChart(rowsDesc) {
  const rows = [...rowsDesc].reverse();
  const sensor = SENSORS.find((s) => s.key === activeSensor);
  const labels = rows.map((r) => fmtTime(r.created_at));
  const data = rows.map((r) => r[activeSensor]);

  if (!chart) {
    const ctx = document.getElementById('chart').getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 360);
    gradient.addColorStop(0, sensor.color + '55');
    gradient.addColorStop(1, sensor.color + '00');

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: sensor.label,
          data,
          borderColor: sensor.color,
          backgroundColor: gradient,
          fill: true,
          tension: 0.35,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: sensor.color,
          pointHoverBorderColor: '#fff',
          pointHoverBorderWidth: 2,
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 400 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(13, 17, 23, 0.95)',
            borderColor: 'rgba(78, 168, 255, 0.3)',
            borderWidth: 1,
            padding: 12,
            cornerRadius: 8,
            titleColor: '#e6edf3',
            bodyColor: '#e6edf3',
            titleFont: { family: 'Inter', size: 12, weight: '600' },
            bodyFont: { family: 'JetBrains Mono', size: 13, weight: '700' },
            displayColors: false,
          },
        },
        scales: {
          x: {
            ticks: {
              color: '#7a8694',
              font: { family: 'JetBrains Mono', size: 10 },
              maxRotation: 0,
              autoSkip: true,
              maxTicksLimit: 8,
            },
            grid: { color: 'rgba(42, 51, 64, 0.4)', drawBorder: false },
          },
          y: {
            ticks: {
              color: '#7a8694',
              font: { family: 'JetBrains Mono', size: 10 },
            },
            grid: { color: 'rgba(42, 51, 64, 0.4)', drawBorder: false },
          },
        },
      },
    });
  } else {
    const ctx = chart.ctx;
    const gradient = ctx.createLinearGradient(0, 0, 0, 360);
    gradient.addColorStop(0, sensor.color + '55');
    gradient.addColorStop(1, sensor.color + '00');

    chart.data.labels = labels;
    chart.data.datasets[0].label = sensor.label;
    chart.data.datasets[0].data = data;
    chart.data.datasets[0].borderColor = sensor.color;
    chart.data.datasets[0].backgroundColor = gradient;
    chart.data.datasets[0].pointHoverBackgroundColor = sensor.color;
    chart.update();
  }

  renderChartStats(data, sensor);
}

function renderInfoBar(rowsDesc) {
  const latest = rowsDesc[0];
  const oldest = rowsDesc[rowsDesc.length - 1];
  const total = rowsDesc.length;

  let intervalText = '—';
  if (latest && oldest && total > 1) {
    const span = (new Date(latest.created_at) - new Date(oldest.created_at)) / 1000;
    const avgInterval = span / (total - 1);
    intervalText = `~${avgInterval.toFixed(1)}s`;
  }

  const lastSeen = latest ? fmtAgo(latest.created_at) : '—';
  const uptime = fmtUptime(Date.now() - sessionStart);

  document.getElementById('infoBar').innerHTML = `
    <div class="info-tile">
      <div class="info-icon">${ICONS.wifi}</div>
      <div class="info-tile-body">
        <span class="info-tile-label">Device</span>
        <span class="info-tile-value">${latest ? 'Online' : 'No data'}</span>
      </div>
    </div>
    <div class="info-tile">
      <div class="info-icon">${ICONS.database}</div>
      <div class="info-tile-body">
        <span class="info-tile-label">Loaded</span>
        <span class="info-tile-value">${total} rows</span>
      </div>
    </div>
    <div class="info-tile">
      <div class="info-icon">${ICONS.zap}</div>
      <div class="info-tile-body">
        <span class="info-tile-label">Avg Interval</span>
        <span class="info-tile-value">${intervalText}</span>
      </div>
    </div>
    <div class="info-tile">
      <div class="info-icon">${ICONS.clock}</div>
      <div class="info-tile-body">
        <span class="info-tile-label">Dashboard Uptime</span>
        <span class="info-tile-value">${uptime}</span>
      </div>
    </div>
    <div class="info-tile">
      <div class="info-icon">${ICONS.clock}</div>
      <div class="info-tile-body">
        <span class="info-tile-label">Last Seen</span>
        <span class="info-tile-value">${lastSeen}</span>
      </div>
    </div>`;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  if (msg) {
    box.textContent = msg;
    box.classList.add('visible');
  } else {
    box.classList.remove('visible');
  }
}

function setConnection(state, msg) {
  const pill = document.getElementById('connectionPill');
  const txt = document.getElementById('connectionText');
  pill.classList.toggle('stale', state !== 'live');
  txt.textContent = msg;
}

async function refresh() {
  try {
    const rows = await fetchRows();
    window._lastRows = rows;
    if (rows.length === 0) {
      showError('No data yet — waiting for ESP32 to upload.');
      setConnection('stale', 'No data');
      return;
    }
    showError(null);
    lastFetchOk = true;
    renderCards(rows);
    updateChart(rows);
    renderInfoBar(rows);

    const ageSec = (Date.now() - new Date(rows[0].created_at).getTime()) / 1000;
    if (ageSec > 30) {
      setConnection('stale', 'Stale');
    } else {
      setConnection('live', 'Live');
    }
    document.getElementById('lastUpdate').textContent =
      `${fmtAgo(rows[0].created_at)} · ${fmtTime(rows[0].created_at)}`;
  } catch (e) {
    console.error(e);
    showError(`Failed to load: ${e.message}`);
    setConnection('stale', 'Offline');
  }
}

document.getElementById('refreshBtn').addEventListener('click', refresh);
renderChartControls();
refresh();
setInterval(refresh, REFRESH_MS);
// Tick uptime every second
setInterval(() => {
  if (window._lastRows) renderInfoBar(window._lastRows);
}, 1000);
</script>
